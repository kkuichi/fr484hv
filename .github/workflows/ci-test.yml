name: CI - Build Docker Images

on:
  push:
    branches:
      - test

env:
  IMAGE_PREFIX: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/gateway:test

      - name: Build and push text-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/text-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/text-service:test

      - name: Build and push image-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/image-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/image-service:test

      - name: Build and push audio-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/audio-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/audio-service:test

      - name: Build and push video-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/video-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/video-service:test